# ============================================================
# 패키지 보안검사 — 의존성 취약점 감사(pnpm audit)
# ============================================================
# 설치한 패키지와 그 하위(전이) 의존성까지 알려진 보안 취약점이 있는지
# 검사한다. 공유 pnpm-lock.yaml 전체를 검사하므로 path 필터 없이 모든
# PR에서 실행한다.
#
# ▶ 현재 단계: 차단 모드 (critical 취약점 발견 시 실패)
#   critical 취약점이 있으면 이 스텝이 실패해 PR 체크가 빨간불이 된다.
#   필요 시 GitHub Settings → Branches 에서 '패키지 보안검사'를 필수 체크로
#   추가하면 머지 차단 게이트가 된다.
# ============================================================
# Security note: untrusted input(issue/PR title 등) 사용하지 않음 → 안전.

name: 패키지 보안검사

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  audit:
    name: 패키지 보안검사
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # pnpm audit 은 pnpm-lock.yaml 만 읽으므로 `pnpm install` 불필요.
      - name: pnpm audit (critical)
        run: |
          echo "::group::pnpm audit (critical, prod deps)"
          pnpm audit --audit-level critical --prod --ignore-registry-errors
          echo "::endgroup::"
